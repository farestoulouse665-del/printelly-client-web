name: Deploy Printelly Client Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: printelly-client-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment start
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment --repo "${{ github.repository }}" 1 --body "PRINTELLY_WEB_STARTED run_id=${{ github.run_id }} run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - uses: actions/checkout@v4
      - name: Validate website
        run: |
          test -s index.html
          test -s styles.css
          test -s app.js
          test -s manifest.webmanifest
          test -s sw.js
          node --check app.js
          grep -Fq "jitxplfujyypfepiajgz.supabase.co" app.js
          if grep -Eqi "service_role|SUPABASE_SERVICE" app.js; then
            echo "Privileged Supabase key detected"
            exit 1
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Report deployment result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment --repo "${{ github.repository }}" 1 --body "PRINTELLY_WEB_FINISHED status=${{ job.status }} run_id=${{ github.run_id }} url=${{ steps.deployment.outputs.page_url }}"
